<!DOCTYPE html>
<html lang="en">
<head>
    {% block head %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> {% block title %}Home {% endblock %} </title>
    <link rel="stylesheet" href="{{ url_for( 'static', filename='style.css' ) }}">
    {% endblock %}
</head>
<body>
    {% block body %} 
    <div class="input-note">
        <h1>Notepad</h1>
        <form action="/submit" method="POST" >
            <input type="text" name="username" required placeholder="Note title"><br> <br>
            <input type="text" name="message" required placeholder="Add a new note..."><br> <br>
            <button type="submit" class="save-btn"> save </button>
        </form> 
    </div>
    <div class="style-note">
        <h2>Saved Notes </h2>
        {% for note in notes %}  
            <form action="/delete/{{ note[0] }}" >
                <p>
                    {{ note[0] }} <br> {{ note[2] }} <br> <br>
                    <a href="/edit/{{ note[0] }}" class="edit-btn" >Edit</a>
                    <a href="/delete/{{ note[0] }}" class="delete-btn">Delete</a>
                </p>
            </form>
        {% endfor %}
    </div>
    {% endblock %}
</body>
</html>
